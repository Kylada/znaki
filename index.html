<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Знаки — Симулятор</title>
    <script>
      // Global error handler to catch any uncaught errors
      window.addEventListener('error', function(e) {
        var root = document.getElementById('root');
        if (root && !root.hasChildNodes()) {
          root.innerHTML = '<div style="color:#ff6b6b;background:#111;min-height:100vh;padding:40px;font-family:monospace">' +
            '<h1 style="font-size:24px;margin-bottom:16px">⚠️ Ошибка</h1>' +
            '<pre style="white-space:pre-wrap;font-size:12px;color:#ccc">' + e.message + '\n' + (e.filename || '') + ':' + (e.lineno || '') + '</pre></div>';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled promise rejection:', e.reason);
      });

      // Polyfills for Node.js globals used by PeerJS and XLSX
      if (typeof globalThis.process === 'undefined') {
        globalThis.process = { env: {}, browser: true, version: '', nextTick: function(fn) { setTimeout(fn, 0); } };
      }
      if (typeof globalThis.Buffer === 'undefined') {
        globalThis.Buffer = {
          isBuffer: function() { return false; },
          from: function(data) {
            if (typeof data === 'string') {
              return new TextEncoder().encode(data);
            }
            return new Uint8Array(data);
          },
          alloc: function(size) { return new Uint8Array(size); },
          allocUnsafe: function(size) { return new Uint8Array(size); },
          concat: function(list) {
            var totalLength = list.reduce(function(sum, buf) { return sum + buf.length; }, 0);
            var result = new Uint8Array(totalLength);
            var offset = 0;
            list.forEach(function(buf) { result.set(buf, offset); offset += buf.length; });
            return result;
          }
        };
      }
      if (typeof globalThis.global === 'undefined') {
        globalThis.global = globalThis;
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
